name: Schema Dump (eenmalig)
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  schema-dump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version
      - name: Dump schema only
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump --schema-only --schema=public --no-owner --no-privileges "$SUPABASE_DB_URL" > schema.sql
          echo "Regels in schema.sql:"
          wc -l schema.sql
      - name: Upload schema as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-schema
          path: schema.sql
          retention-days: 7
